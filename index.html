<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Body Compass</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:   #FF5501;
      --orange2:  #FF8529;
      --lavender: #DEADF6;
      --pink-bg:  #FFD2F0;
      --cream:    #FDF1E6;
      --dark:     #333333;
      --mid:      #666666;
      --white:    #FFFFFF;
      --green:    #10B981;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #FDF1E6 0%, #FFD2F0 100%);
      min-height: 100vh;
      color: var(--dark);
      font-size: 16px;
      line-height: 1.5;
      padding: 24px 16px 48px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(255,85,1,0.15);
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .top-bar {
      background: linear-gradient(90deg, #FF5501 0%, #FF8529 100%);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 24px 24px 0 0;
    }
    .brand-title    { font-size: 20px; font-weight: 700; color: white; }
    .brand-tagline  { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 2px; }
    .top-signout    { font-size: 12px; color: rgba(255,255,255,0.8); cursor: pointer; border: none; background: none; font-family: inherit; }
    .top-signout:hover { color: white; }

    .card-body { padding: 48px; }
    @media (max-width: 600px) {
      .card-body { padding: 32px 24px; }
      .top-bar   { padding: 18px 24px; }
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* PROGRESS */
    .progress-wrap {
      width: 100%; height: 8px;
      background: var(--pink-bg);
      border-radius: 10px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF5501 0%, #FF8529 100%);
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    /* TYPOGRAPHY */
    .page-title {
      font-size: 32px; font-weight: 700;
      color: var(--orange); margin-bottom: 8px; line-height: 1.2;
    }
    .page-subtitle {
      font-size: 16px; color: var(--mid);
      margin-bottom: 32px; line-height: 1.5;
    }
    .question {
      font-size: 24px; font-weight: 600;
      color: var(--dark); margin-bottom: 32px; line-height: 1.3;
    }
    .question small {
      display: block; font-size: 15px; font-weight: 400;
      color: var(--mid); margin-top: 6px;
    }
    @media (max-width: 600px) {
      .page-title { font-size: 24px; }
      .question   { font-size: 20px; }
    }

    /* BUTTONS */
    .btn {
      display: block; width: 100%;
      padding: 20px 24px; border-radius: 16px;
      font-size: 18px; font-weight: 500;
      cursor: pointer; transition: all 0.3s ease;
      text-align: left; font-family: inherit; line-height: 1.3;
      text-decoration: none;
    }
    .btn-choice {
      background: var(--white);
      border: 2px solid var(--lavender);
      color: var(--dark);
      margin-bottom: 16px;
    }
    .btn-choice:hover, .btn-choice.selected {
      background: var(--cream); border-color: var(--orange2);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255,85,1,0.2);
    }
    .btn-choice small {
      display: block; font-size: 14px;
      color: var(--mid); margin-top: 3px; font-weight: 400;
    }
    .btn-primary {
      background: linear-gradient(135deg, #FF5501 0%, #FF8529 100%);
      border: none; color: var(--white);
      text-align: center; margin-bottom: 16px;
    }
    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(255,85,1,0.3);
      transform: translateY(-1px);
    }
    .btn-action {
      background: var(--white); border: 2px solid var(--orange);
      color: var(--orange); border-radius: 12px;
      padding: 16px 32px; text-align: center;
      font-size: 16px; margin-bottom: 12px;
      display: block; width: 100%; cursor: pointer;
      font-family: inherit; font-weight: 500;
      transition: all 0.3s ease;
    }
    .btn-action:hover { background: var(--cream); }

    .btn-back {
      background: none; border: none;
      color: var(--mid); font-size: 14px;
      font-family: inherit; cursor: pointer;
      padding: 8px 0; margin-bottom: 24px; display: none;
    }
    .btn-back:hover { color: var(--orange); }
    .btn-back.show  { display: block; }

    .btn-ghost {
      background: none; border: none;
      color: var(--mid); font-size: 14px;
      font-family: inherit; cursor: pointer;
      padding: 8px 0; display: block;
      text-align: center; width: 100%; margin-top: 8px;
    }
    .btn-ghost:hover { color: var(--orange); }

    /* GOOGLE */
    .btn-google {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; width: 100%; padding: 16px 24px;
      background: var(--white); border: 2px solid var(--lavender);
      border-radius: 16px; font-size: 16px; font-weight: 500;
      color: var(--dark); cursor: pointer; transition: all 0.3s ease;
      font-family: inherit; margin-bottom: 16px;
    }
    .btn-google:hover { border-color: var(--orange2); background: var(--cream); }

    /* DIVIDER */
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--mid); font-size: 14px; margin: 8px 0 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--lavender);
    }

    /* INPUTS */
    .field { margin-bottom: 20px; }
    label  { display: block; font-size: 14px; color: var(--mid); margin-bottom: 6px; }
    input[type="email"], input[type="password"],
    input[type="number"], input[type="text"], select {
      width: 100%; padding: 12px;
      border: 2px solid var(--lavender); border-radius: 8px;
      font-size: 16px; font-family: inherit;
      color: var(--dark); background: var(--white);
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--orange); }

    /* RESULT BOX */
    .result-box {
      background: var(--cream); padding: 24px;
      border-radius: 16px; border-left: 4px solid var(--orange);
      margin-bottom: 24px;
    }
    .result-title  { font-size: 28px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
    .result-icon   { font-size: 32px; margin-bottom: 8px; }

    /* CALORIE DISPLAY */
    .cal-display {
      background: var(--cream); border-radius: 16px;
      padding: 24px; text-align: center;
      margin-bottom: 24px; border: 2px solid var(--orange);
    }
    .cal-label  { font-size: 14px; color: var(--mid); margin-bottom: 4px; }
    .cal-number { font-size: 48px; font-weight: 700; color: var(--orange); line-height: 1; }
    .cal-unit   { font-size: 16px; color: var(--mid); margin-top: 2px; }
    .cal-change { font-size: 14px; color: var(--orange2); font-weight: 500; margin-top: 4px; }

    /* MACROS */
    .macros-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 12px; margin-bottom: 24px;
    }
    .macro-card { background: var(--cream); border-radius: 12px; padding: 16px 12px; text-align: center; }
    .macro-val  { font-size: 22px; font-weight: 700; color: var(--dark); }
    .macro-lbl  { font-size: 12px; color: var(--mid); margin-top: 2px; }

    /* STATS GRID */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .stat-card  { background: var(--cream); border-radius: 12px; padding: 16px; }
    .stat-val   { font-size: 20px; font-weight: 700; color: var(--orange); }
    .stat-lbl   { font-size: 12px; color: var(--mid); margin-top: 2px; }

    /* PHASE BADGE */
    .phase-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600; margin-bottom: 20px;
    }
    .phase-cut      { background: rgba(255,85,1,0.1);    color: var(--orange); }
    .phase-reverse  { background: rgba(16,185,129,0.12); color: var(--green); }
    .phase-maintain { background: rgba(222,173,246,0.35); color: #7c3aed; }
    .phase-build    { background: rgba(51,51,51,0.08);   color: var(--dark); }

    /* WARNING */
    .warning-box {
      background: rgba(255,85,1,0.06);
      border: 2px solid rgba(255,85,1,0.25);
      border-radius: 16px; padding: 20px; margin-bottom: 24px;
    }
    .warning-box h4 { font-size: 18px; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
    .warning-box p  { font-size: 15px; color: var(--dark); line-height: 1.5; }

    /* MESSAGES */
    .msg { font-size: 14px; padding: 12px 16px; border-radius: 8px; margin-top: 12px; display: none; }
    .msg.show      { display: block; }
    .msg-error     { background: rgba(255,85,1,0.08); color: #c0392b; }
    .msg-success   { background: rgba(16,185,129,0.1); color: var(--green); }

    /* NAV TABS */
    .nav-tabs { display: flex; border-bottom: 2px solid var(--lavender); margin-bottom: 28px; }
    .nav-tab {
      flex: 1; padding: 12px 8px;
      font-size: 14px; font-weight: 500;
      color: var(--mid); background: none; border: none;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      cursor: pointer; font-family: inherit; text-align: center;
      transition: all 0.2s;
    }
    .nav-tab:hover { color: var(--dark); }
    .nav-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* HISTORY TABLE */
    .history-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .history-table th {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--mid); padding: 8px 10px;
      text-align: left; border-bottom: 2px solid var(--lavender);
    }
    .history-table td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--pink-bg);
      color: var(--dark); vertical-align: middle;
    }
    .history-table tr:last-child td { border-bottom: none; }

    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .badge-cut      { background: rgba(255,85,1,0.1);    color: var(--orange); }
    .badge-reverse  { background: rgba(16,185,129,0.12); color: var(--green); }
    .badge-maintain { background: rgba(222,173,246,0.4); color: #7c3aed; }
    .badge-build    { background: rgba(51,51,51,0.08);   color: var(--dark); }
    .badge-outlier  { background: var(--pink-bg);        color: var(--mid); }

    /* ADMIN */
    .client-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid var(--pink-bg);
      cursor: pointer; transition: opacity 0.2s;
    }
    .client-row:hover { opacity: 0.7; }
    .client-row:last-child { border-bottom: none; }
    .client-name { font-weight: 600; font-size: 15px; }
    .client-meta { font-size: 13px; color: var(--mid); margin-top: 4px; }
    .admin-label { font-size: 11px; background: rgba(255,85,1,0.1); color: var(--orange); padding: 3px 10px; border-radius: 20px; font-weight: 600; margin-left: 8px; }

    /* CHECKLIST */
    .checklist { list-style: none; margin: 20px 0; }
    .checklist li {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--pink-bg); font-size: 15px;
    }
    .checklist li:last-child { border-bottom: none; }
    .check-mark { color: var(--green); font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* UTILITIES */
    .text-mid    { color: var(--mid); font-size: 14px; }
    .text-center { text-align: center; }
    .mt-8  { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mt-32 { margin-top: 32px; }
    .end-msg { text-align: center; font-size: 16px; color: var(--mid); margin-top: 8px; }

    .spinner-wrap { text-align: center; padding: 40px 0; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--pink-bg);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container" id="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div>
      <div class="brand-title">🧭 Dream Body Compass</div>
      <div class="brand-tagline">Personalised calorie guidance in under 2 minutes</div>
    </div>
    <button class="top-signout" id="top-signout" style="display:none" onclick="signOut()">Sign out</button>
  </div>

  <!-- AUTH -->
  <div class="card-body screen active" id="screen-auth">
    <h1 class="page-title">Welcome back 👋</h1>
    <p class="page-subtitle">Sign in to access your weekly check-in and calorie guidance.</p>

    <div class="field">
      <label for="auth-email">Email</label>
      <input type="email" id="auth-email" name="email" autocomplete="email" placeholder="your@email.com" />
    </div>
    <div class="field">
      <label for="auth-password">Password</label>
      <input type="password" id="auth-password" name="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <div id="auth-error" class="msg msg-error"></div>
    <div id="auth-success" class="msg msg-success"></div>
    <button class="btn btn-primary mt-16" onclick="signInWithEmail()">Sign In</button>
    <button class="btn-action" onclick="signUpWithEmail()">Create Account</button>
    <button class="btn-ghost" onclick="showForgotPassword()" style="display:block;width:100%;text-align:center;margin-top:8px;">Forgot password?</button>
    <div id="forgot-wrap" style="display:none;margin-top:16px;">
      <div class="field"><label for="forgot-email">Enter your email</label><input type="email" id="forgot-email" name="forgot-email" autocomplete="email" placeholder="your@email.com" /></div>
      <button class="btn btn-primary mt-8" onclick="sendPasswordReset()">Send reset email</button>
      <div id="forgot-msg" class="msg"></div>
    </div>
    <p class="text-mid text-center mt-16">For Dream Body Blueprint graduates only.</p>
  </div>

  <!-- ONBOARDING -->
  <div class="card-body screen" id="screen-onboarding">
    <div class="progress-wrap"><div class="progress-fill" id="ob-progress" style="width:0%"></div></div>
    <div id="ob-content"></div>
  </div>

  <!-- TRIAGE -->
  <div class="card-body screen" id="screen-triage">
    <div class="progress-wrap"><div class="progress-fill" id="triage-progress" style="width:0%"></div></div>
    <div id="triage-content"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="card-body screen" id="screen-dashboard">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('home')">Home</button>
      <button class="nav-tab" onclick="showTab('history')">History</button>
      <button class="nav-tab" onclick="showTab('settings')">Settings</button>
    </div>
    <div id="tab-home"></div>
    <div id="tab-history" style="display:none"></div>
    <div id="tab-settings" style="display:none"></div>
  </div>

  <!-- CHECK-IN -->
  <div class="card-body screen" id="screen-checkin">
    <div class="progress-wrap"><div class="progress-fill" id="ci-progress" style="width:0%"></div></div>
    <div id="ci-content"></div>
  </div>

  <!-- RESULT -->
  <div class="card-body screen" id="screen-result">
    <div id="result-content"></div>
  </div>

  <!-- ADMIN -->
  <div class="card-body screen" id="screen-admin">
    <div style="display:flex;align-items:center;margin-bottom:24px;">
      <h1 class="page-title" style="margin:0;">Clients</h1>
      <span class="admin-label">Admin</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showAdminTab('admin-clients')">All Clients</button>
      <button class="nav-tab" onclick="showAdminTab('admin-flags')">🚩 Flags</button>
    </div>
    <div id="admin-clients"></div>
    <div id="admin-flags" style="display:none"></div>
  </div>

</div>

<script>
// CONFIG
const SUPABASE_URL      = 'https://mvjnlvmjlekpnqedztdv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12am5sdm1qbGVrcG5xZWR6dGR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDU1MjgsImV4cCI6MjA4ODI4MTUyOH0.3TSlhWH4oe8WHRCNI3P3s-U_hp_1JO0Lxke50wdZkBs';
const ADMIN_EMAIL       = 'hello@emilycontarino.com';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null, profile = null;
let checkinData = {}, triageData = { source:'', answers:{} };
let obData = {}, obStep = 0;
let checkinRedFlags = [];

// UNIT HELPERS
function getUnit() { return (profile && profile.unit_pref === "lbs") ? "lbs" : "kg"; }
function toKg(val) { return getUnit() === "lbs" ? Math.round(val / 2.20462 * 10) / 10 : val; }
function fromKg(val) { return getUnit() === "lbs" ? Math.round(val * 2.20462 * 10) / 10 : val; }
function wLabel(val) { if (!val) return "—"; return fromKg(val) + getUnit(); }

// SCREENS
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  document.getElementById('top-signout').style.display = id !== 'screen-auth' ? 'block' : 'none';
}

function showTab(name) {
  ['home','history','settings'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((el,i) => {
    el.classList.toggle('active', ['home','history','settings'][i]===name);
  });
  if (name==='history')  loadHistory();
  if (name==='settings') loadSettings();
}

function showAdminTab(name) {
  ['admin-clients','admin-flags'].forEach(t => {
    document.getElementById(t).style.display = t===name ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((el,i) => {
    el.classList.toggle('active', ['admin-clients','admin-flags'][i]===name);
  });
}

// AUTH

async function signInWithEmail() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-password').value;
  if (!email||!pass) return showMsg('auth-error','Please fill in all fields.','error');
  showMsg('auth-success','Signing in...','success');
  const { data, error } = await db.auth.signInWithPassword({ email, password:pass });
  if (error) {
    showMsg('auth-error','Incorrect email or password. Please try again.','error');
    return;
  }
  if (data?.user) {
    currentUser = data.user;
    await loadProfile();
  }
}
async function signUpWithEmail() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-password').value;
  if (!email||!pass)    return showMsg('auth-error','Please fill in all fields.','error');
  if (pass.length < 6)  return showMsg('auth-error','Password must be at least 6 characters.','error');
  showMsg('auth-success','Creating your account...','success');
  const { data, error } = await db.auth.signUp({ email, password:pass });
  if (error) {
    if (error.message.includes('already registered') || error.message.includes('already exists')) {
      showMsg('auth-error','An account with this email already exists. Please sign in instead.','error');
    } else {
      showMsg('auth-error', error.message, 'error');
    }
    return;
  }
  if (data?.user) {
    showMsg('auth-success','Account created! Signing you in...','success');
    await new Promise(r => setTimeout(r, 1500));
    const { error: signInError } = await db.auth.signInWithPassword({ email, password:pass });
    if (signInError) showMsg('auth-success','Account created! Please tap Sign In to continue.','success');
  }
}
function showForgotPassword() {
  const w = document.getElementById('forgot-wrap');
  w.style.display = w.style.display === 'none' ? 'block' : 'none';
}
async function sendPasswordReset() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) return showMsg('forgot-msg','Please enter your email.','error');
  const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  if (error) showMsg('forgot-msg', error.message, 'error');
  else showMsg('forgot-msg','Reset email sent! Check your inbox.','success');
}
async function signOut() {
  await db.auth.signOut();
  currentUser = null; profile = null;
  showScreen('screen-auth');
}
db.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session?.user && !currentUser) {
    currentUser = session.user;
    await loadProfile();
  }
  if (event === 'SIGNED_OUT') {
    currentUser = null; profile = null;
    showScreen('screen-auth');
  }
});

// PROFILE
async function loadProfile() {
  const { data } = await db.from('profiles').select('*').eq('user_id', currentUser.id).single();
  if (!data) { startOnboarding(); }
  else {
    profile = data;
    if (currentUser.email === ADMIN_EMAIL) loadAdminDashboard();
    else { await checkAutoTriggers(); loadDashboard(); }
  }
}

// ONBOARDING
const obSteps = [
  { p:15, render:()=>`
    <h1 class="page-title">Let's get you set up 🎯</h1>
    <p class="page-subtitle">This takes about 2 minutes. We need a few details to personalise your Compass.</p>
    <div class="field mt-24"><label>Your first name</label><input type="text" id="ob-name" placeholder="e.g. Sarah" /></div>
    <button class="btn btn-primary mt-16" onclick="obNext({name:document.getElementById('ob-name').value.trim()})">Continue →</button>
  `},
  { p:40, render:()=>`
    <button class="btn-back show" onclick="obBack()">← Back</button>

function renderObStep() {

function obNext(data) {
  const vals = Object.values(data);

async function finaliseTriage(phase) {
  document.getElementById('triage-progress').style.width = '100%';
  document.getElementById('triage-content').innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><p class="text-mid">Setting up your Compass…</p></div>`;
  try {
    const isNew = !profile;
    const prevPhase = profile && profile.current_phase;
    const baseCal = obData.current_calories || (profile && profile.current_calories) || 1500;
    let newCal = baseCal;
    if (!isNew) {
      if (phase === 'cut')     newCal = baseCal - 100;
      if (phase === 'reverse') newCal = baseCal + 50;
      if (phase === 'build')   newCal = baseCal + 100;
      if (phase === 'maintain' && prevPhase === 'build') newCal = baseCal - 100;
    }
    newCal = Math.max(1200, newCal);
    const resetAnchor = phase === 'maintain' && prevPhase !== 'maintain';
    const pd = {
      user_id: currentUser.id,
      email: currentUser.email,
      name: obData.name || (profile && profile.name) || (currentUser.user_metadata && currentUser.user_metadata.full_name) || '',
      macro_bodyweight: obData.macro_bodyweight || (profile && profile.macro_bodyweight),
      current_calories: newCal,
      current_phase: phase,
      red_flags: triageData.answers.red_flags || [],
      risk_acknowledged: triageData.answers.risk_acknowledged || false,
      maintenance_anchor_weight: resetAnchor ? null : ((profile && profile.maintenance_anchor_weight) || null),
      weeks_at_1200: (profile && profile.weeks_at_1200) || 0,
      updated_at: new Date().toISOString()
    };
    if (isNew) pd.created_at = new Date().toISOString();
    let data, error;
    if (isNew) {
      const res = await db.from('profiles').insert(pd).select().single();
      data = res.data; error = res.error;
    } else {
      const res = await db.from('profiles').update(pd).eq('user_id', currentUser.id).select().single();
      data = res.data; error = res.error;
    }
    if (error) { alert('Error saving: ' + error.message + ' | Code: ' + error.code); return; }
    const oldPhase = prevPhase;
    profile = data;
    if (!isNew) await logPhaseChange(oldPhase, phase);
  } catch(e) { alert('Unexpected error: ' + e.message); return; }
  const phaseLabel = { cut:'Cut', reverse:'Reverse Diet', maintain:'Maintenance', build:'Build' };
  const macros = calcMacros(profile.current_calories, profile.macro_bodyweight, profile.current_phase);
  document.getElementById('triage-content').innerHTML = `
    <div class="result-box"><div class="result-icon">🎯</div><h2 class="result-title">You're in the ${phaseLabel[phase]} phase!</h2></div>
    <ul class="checklist">
      <li><span class="check-mark">✓</span>Phase set: ${phaseLabel[phase]}</li>
      <li><span class="check-mark">✓</span>Daily calories: ${profile.current_calories} kcal</li>
      <li><span class="check-mark">✓</span>Protein: ${macros.protein}g · Fats: ${macros.fats}g · Carbs: ${macros.carbs}g</li>
    </ul>
    <button class="btn btn-primary mt-24" onclick="loadDashboard()">Go to my Compass →</button>`;
}

async function logPhaseChange(fromPhase, toPhase) {
  if (!fromPhase || fromPhase === toPhase) return;
  const pLabel = { cut:'Cut', reverse:'Reverse Diet', maintain:'Maintenance', build:'Build' };
  await db.from('checkins').insert({
    user_id: currentUser.id,
    phase: toPhase,
    is_outlier: false,
    result: 'phase_change',
    result_message: `Phase changed: ${pLabel[fromPhase]||fromPhase} → ${pLabel[toPhase]||toPhase}`,
    calories_before: profile.current_calories,
    calories_after: profile.current_calories,
    created_at: new Date().toISOString()
  });
}

async function checkAutoTriggers() {
  if (!profile || profile.current_phase !== 'maintain') return;
  const { data } = await db.from('checkins').select('created_at')
    .eq('user_id', currentUser.id).eq('phase','maintain')
    .order('created_at',{ascending:true}).limit(1);
  if (data?.length) {
    const weeks = Math.floor((Date.now()-new Date(data[0].created_at))/6048e5);
    if (weeks >= 16) {
      const el = document.getElementById('trigger-msg');
      if (el) el.innerHTML = `<div class="warning-box mt-16">
        <h4>🔄 Time to reassess your goal</h4>

        <button class="btn-action mt-16" onclick="startTriage('reassess')" style="font-size:15px;padding:12px 20px;">Reassess now →</button>

    }
  }
}

// CORE CALCULATION
async function processCheckin() {
  setCI(92,`<div class="spinner-wrap"><div class="spinner"></div><p class="text-mid">Calculating your recommendation…</p></div>`);
  const { data: prev } = await db.from('checkins').select('*')
    .eq('user_id', currentUser.id).eq('is_outlier', false)
    .not('weight','is',null).neq('result','phase_change')
    .not('deleted','is',true)
    .order('created_at',{ascending:false}).limit(5);
  const cw = checkinData.weight;
  const phase = profile.current_phase;
  let newCal = profile.current_calories, result='', msg='';

  if (!prev || prev.length < 3) {
    const isFirst  = !prev || prev.length === 0;
    const isSecond = prev && prev.length === 1;
    const resultType = isFirst ? 'first_checkin' : 'second_checkin';
    const resultMsg  = isFirst
      ? "You're in the system! We need a couple more weeks of data before making a recommendation — see you next week!"
      : "Good data coming in! One more week and we'll have enough to make your first recommendation.";
    await saveCI({ weight:cw, is_outlier:false, calories_before:profile.current_calories, calories_after:profile.current_calories, result:resultType, result_message:resultMsg });
    showResult({ type:resultType, newCal:profile.current_calories, oldCal:profile.current_calories, msg:resultMsg });
    return;
  }

  const pw = prev[0].weight;
  const pct = ((cw-pw)/pw)*100;

  if (phase==='cut') {
    // Track weeks at 1200 — every check-in at 1200 counts, regardless of outcome
    if (profile.current_calories <= 1200) {
      const nw = (profile.weeks_at_1200||0)+1;
      await db.from('profiles').update({ weeks_at_1200:nw }).eq('user_id', currentUser.id);
      profile.weeks_at_1200 = nw;
      if (nw>=4) {
        newCal=1300;
        await db.from('profiles').update({ current_phase:'reverse', weeks_at_1200:0, current_calories:newCal, updated_at:new Date().toISOString() }).eq('user_id', currentUser.id);
        profile.current_phase='reverse'; profile.current_calories=newCal; result='force_reverse';
        msg="Your body has been working hard enough. Time to reverse diet — calories increased and your phase has been updated. Trust the process!";
        await saveCI({ weight:cw, is_outlier:false, calories_before:profile.current_calories, calories_after:newCal, result, result_message:msg, pct_change:pct });
        // Check if goal weight reached (cut phase only)
  if (phase === 'cut' && profile.goal_weight && cw <= profile.goal_weight) {
    await db.from('profiles').update({ goal_weight:null, updated_at:new Date().toISOString() }).eq('user_id', currentUser.id);
    profile.goal_weight = null;
    showGoalReached(newCal); return;
  }
  showResult({ type:result, newCal, oldCal:profile.current_calories, msg }); return;
      }
    }
    // If already at 1200 — hold and show holding message regardless of weight change
    if (profile.current_calories <= 1200) {
      result='cut_at_1200'; msg="You're currently on our minimum calorie plan of 1,200 calories. We never go below this — it's non-negotiable for your health. Keep checking in each week and we'll move you into a reverse diet when the time is right.";
    } else if (pct <= -0.5) {
      result='cut_losing'; msg="Scale's moving, baby! Stay exactly where you are — your body is doing its thing.";
    } else {
      const prevPct = prev.length >= 2 ? ((prev[0].weight - prev[1].weight) / prev[1].weight) * 100 : null;
      const twoPlateau = prevPct !== null && prevPct > -0.5;
      if (!twoPlateau) {
        result='cut_losing'; msg="Scale's moving, baby! Stay exactly where you are — your body is doing its thing.";
      } else {
        newCal = Math.max(1200, profile.current_calories-100);
        result='cut_plateau'; msg="Time to shake things up! We're dropping your calories by 100 to get things moving again.";
      }
    }
  } else if (phase==='reverse') {
    if (pct<=0.3) { newCal=profile.current_calories+100; result='reverse_healthy'; msg="This is exactly how it's supposed to go. Adding 100 calories — your metabolism is loving this."; }
    else { newCal=Math.max(1200,profile.current_calories-50); result='reverse_fast'; msg='Slow and steady wins the race here. Pulling back 50 calories to keep things smooth.'; }
  } else if (phase==='maintain') {
    let anchor = profile.maintenance_anchor_weight;
    if (!anchor) {
      anchor = cw;
      await db.from('profiles').update({ maintenance_anchor_weight:anchor }).eq('user_id', currentUser.id);
    }
    const diff=cw-anchor;
    if (Math.abs(diff)<=0.75) { result='maintain_stable'; msg="Your weight is perfectly stable this week. *chef's kiss!* Keep your calories exactly as they are!"; }
    else if (diff<-0.75) { newCal=profile.current_calories+50; result='maintain_low'; msg="Your weight has drifted a little low — adding 50 calories to bring you back to your happy place."; }
    else { newCal=Math.max(1200,profile.current_calories-50); result='maintain_high'; msg="Your weight has nudged a little high — dropping 50 calories to rebalance. No stress, this is totally normal."; }
  } else if (phase==='build') {
    if (pct<0.3) { newCal=profile.current_calories+100; result='build_slow'; msg='We need to feed the machine! Adding 100 calories to get your build moving.'; }
    else if (pct<=0.5) { result='build_perfect'; msg='This is the sweet spot right here. Stay exactly where you are — your body is responding perfectly.'; }
    else {
      if (checkinData.discomfort) { newCal=Math.max(1200,profile.current_calories-100); result='build_fast_discomfort'; msg="Let's slow down that gain and make your digestion a little more comfortable! Pulling back 100 calories."; }
      else { newCal=Math.max(1200,profile.current_calories-50); result='build_fast'; msg='Gaining a little faster than ideal. Pulling back 50 calories to slow the rate of gain.'; }
    }
  }

  await saveCI({ weight:cw, is_outlier:false, calories_before:profile.current_calories, calories_after:newCal, result, result_message:msg, pct_change:pct });
  // Auto-update macro bodyweight if current weight differs by 5kg or more
  const bwDiff = Math.abs(cw - profile.macro_bodyweight);
  let updatedFields = { updated_at:new Date().toISOString() };
  if (newCal !== profile.current_calories) { updatedFields.current_calories = newCal; profile.current_calories = newCal; }
  if (bwDiff >= 5) { updatedFields.macro_bodyweight = cw; profile.macro_bodyweight = cw; }
  if (Object.keys(updatedFields).length > 1) {
    await db.from('profiles').update(updatedFields).eq('user_id', currentUser.id);
  }
  // Check if goal weight reached (cut phase only)
  if (phase === 'cut' && profile.goal_weight && cw <= profile.goal_weight) {
    await db.from('profiles').update({ goal_weight:null, updated_at:new Date().toISOString() }).eq('user_id', currentUser.id);
    profile.goal_weight = null;
    showGoalReached(newCal); return;
  }
  showResult({ type:result, newCal, oldCal:profile.current_calories, msg });
}

// MACROS
function calcMacros(cal, bw, phase) {
  const protein    = Math.round(bw * 2);
  const fatsTarget = Math.round(bw * (phase === 'cut' ? 0.7 : 1.0));
  const fatsMin    = Math.max(1, Math.round(bw * 0.5)); // never below 0.5g/kg
  const carbsMin   = 50;

  // Check if target fats leaves enough room for minimum carbs
  let fats = fatsTarget;
  let remain = cal - (protein * 4) - (fats * 9);
  if (remain / 4 < carbsMin) {
    // Reduce fats until carbs hit 50g, but never below fatsMin
    fats = Math.max(fatsMin, Math.floor((cal - (protein * 4) - (carbsMin * 4)) / 9));
    remain = cal - (protein * 4) - (fats * 9);
  }
  const carbs = Math.round(Math.max(0, remain) / 4 / 5) * 5;
  return { protein, fats, carbs };
}

      <p class="text-mid mt-8">Your goal weight in ${getUnit()}. Shows your progress on the dashboard.</p>
    </div>` : ''}
    <button class="btn btn-primary mt-16" onclick="saveSettings()">Save changes</button>
    <div id="set-msg" class="msg"></div>`;
}
function selectUnit(u) {
  profile.unit_pref = u;
  document.querySelectorAll('#unit-kg,#unit-lbs').forEach(el=>el.classList.remove('selected'));
  document.getElementById('unit-'+u).classList.add('selected');
  // Refresh goal weight label
  const gl = document.querySelector('#set-goal')?.previousElementSibling;
  if (gl) gl.textContent = 'Goal weight (' + getUnit() + ')';
}
async function saveSettings() {
  const name = document.getElementById('set-name').value.trim();
  const unit = profile.unit_pref || 'kg';
  const goalRaw = document.getElementById('set-goal') ? parseFloat(document.getElementById('set-goal').value) : null;
  const goalKg = goalRaw ? toKg(goalRaw) : null;
  const updates = { name, unit_pref:unit, updated_at:new Date().toISOString() };
  if (goalKg) updates.goal_weight = goalKg;
  const { error } = await db.from('profiles').update(updates).eq('user_id', currentUser.id);
  if (!error) { profile.name=name; profile.unit_pref=unit; if(goalKg) profile.goal_weight=goalKg; showMsg('set-msg','Saved ✓','success'); renderHome(); }
  else showMsg('set-msg','Error saving — please try again.','error');
}

// ADMIN
async function loadAdminDashboard() {
  showScreen('screen-admin');
  const { data:clients } = await db.from('profiles').select('*').neq('email', ADMIN_EMAIL).order('updated_at',{ascending:false});
  const pL = { cut:'Cut', reverse:'Reverse', maintain:'Maintain', build:'Build' };
  const pC = { cut:'badge-cut', reverse:'badge-reverse', maintain:'badge-maintain', build:'badge-build' };
  document.getElementById('admin-clients').innerHTML = clients?.length ? `
    <p class="text-mid" style="margin-bottom:16px;">${clients.length} clients</p>
    ${clients.map(c=>`<div class="client-row" onclick="viewClient('${c.user_id}')">
      <div>
        <div class="client-name">${c.name||c.email}</div>
        <div class="client-meta"><span class="badge ${pC[c.current_phase]||''}" style="margin-right:6px;">${pL[c.current_phase]||'—'}</span>${c.current_calories} kcal · BW ${c.macro_bodyweight}kg</div>
      </div><span style="color:var(--mid)">→</span>
    </div>`).join('')}` : '<p class="text-mid">No clients yet.</p>';
  const { data:flags } = await db.from('admin_flags').select('*').order('created_at',{ascending:false}).limit(30);
  document.getElementById('admin-flags').innerHTML = flags?.length ? flags.map(f=>`
    <div style="padding:16px 0;border-bottom:1px solid var(--pink-bg);">
      <div style="font-weight:600;font-size:15px;">${f.name||f.email}</div>
      <div class="text-mid">${f.flag_type} · ${new Date(f.created_at).toLocaleDateString('en-GB')}</div>
      <div class="text-mid mt-8" style="font-size:13px;">${JSON.stringify(f.details)}</div>
    </div>`).join('') : '<p class="text-mid">No flags.</p>';
}
async function viewClient(uid) {
  const { data:c } = await db.from('profiles').select('*').eq('user_id',uid).single();
  if (!c) return;
  const pL = { cut:'Cut', reverse:'Reverse Diet', maintain:'Maintenance', build:'Build' };
  document.getElementById('admin-clients').innerHTML = `
    <button class="btn-back show" onclick="loadAdminDashboard()">← All clients</button>
    <h2 style="font-size:22px;font-weight:700;margin-bottom:4px;">${c.name||c.email}</h2>
    <p class="text-mid" style="margin-bottom:24px;">${c.email}</p>
    <div class="field"><label>Phase</label>
      <select id="ac-phase">${['cut','reverse','maintain','build'].map(p=>`<option value="${p}"${c.current_phase===p?' selected':''}>${pL[p]}</option>`).join('')}</select></div>
    <div class="field"><label>Current calories</label><input type="number" id="ac-cal" value="${c.current_calories}" /></div>
    <div class="field"><label>Macro bodyweight (kg)</label><input type="number" id="ac-bw" value="${c.macro_bodyweight}" step="0.1" /></div>
    <div class="field"><label>Internal notes</label><input type="text" id="ac-notes" value="${c.notes||''}" placeholder="Notes visible to you only…" /></div>
    <button class="btn btn-primary" onclick="saveClient('${uid}')">Save changes</button>
    <div id="ac-msg" class="msg"></div>`;
}
async function saveClient(uid) {
  const { error } = await db.from('profiles').update({
    current_phase: document.getElementById('ac-phase').value,
    current_calories: parseInt(document.getElementById('ac-cal').value),
    macro_bodyweight: parseFloat(document.getElementById('ac-bw').value),
    notes: document.getElementById('ac-notes').value,
    updated_at: new Date().toISOString()
  }).eq('user_id',uid);
  showMsg('ac-msg', error?'Error saving.':'Saved ✓', error?'error':'success');
}

// UTILS
function showMsg(id,txt,type) {
  const el = document.getElementById(id); if (!el) return;
  el.textContent=txt; el.className=`msg msg-${type} show`;
  setTimeout(()=>el.classList.remove('show'),4000);
}

// INIT
(async()=>{
  const { data:{ session } } = await db.auth.getSession();
  if (session?.user) { currentUser=session.user; await loadProfile(); }
  else showScreen('screen-auth');
})();
</script>
